<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Simple chain links -->
  <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- First chain link -->
    <path d="M8 16 
             C8 12 12 8 16 8 
             C20 8 24 12 24 16 
             C24 20 20 24 16 24 
             C12 24 8 20 8 16 
             Z"/>
    
    <!-- Second chain link (rotated) -->
    <path d="M12 16 
             C12 14 14 12 16 12 
             C18 12 20 14 20 16 
             C20 18 18 20 16 20 
             C14 20 12 18 12 16 
             Z" 
          transform="rotate(45 16 16)"/>
    
    <!-- Connection line -->
    <line x1="16" y1="8" x2="16" y2="24" stroke="currentColor" stroke-width="1"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="currentColor"/>
</svg>