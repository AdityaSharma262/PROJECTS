<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main chain link -->
  <g filter="url(#glow)">
    <path d="M20 8
             C26.6 8 32 13.4 32 20
             C32 26.6 26.6 32 20 32
             C13.4 32 8 26.6 8 20
             C8 13.4 13.4 8 20 8
             Z
             M20 12
             C15.6 12 12 15.6 12 20
             C12 24.4 15.6 28 20 28
             C24.4 28 28 24.4 28 20
             C28 15.6 24.4 12 20 12
             Z" 
          fill="url(#chainGradient)"/>
  </g>
  
  <!-- Connected chain link -->
  <g transform="rotate(45 20 20)" filter="url(#glow)">
    <path d="M30 15
             C33.3 15 36 17.7 36 21
             C36 24.3 33.3 27 30 27
             C26.7 27 24 24.3 24 21
             C24 17.7 26.7 15 30 15
             Z
             M30 18
             C28.3 18 27 19.3 27 21
             C27 22.7 28.3 24 30 24
             C31.7 24 33 22.7 33 21
             C33 19.3 31.7 18 30 18
             Z" 
          fill="url(#chainGradient)"/>
  </g>
  
  <!-- Center connecting element -->
  <circle cx="20" cy="20" r="3" fill="white" opacity="0.9"/>
  <circle cx="20" cy="20" r="1.5" fill="url(#chainGradient)"/>
</svg>